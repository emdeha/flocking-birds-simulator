<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bird Flocking Simulator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
      }

      #app {
        display: flex;
        width: 100%;
        height: 100%;
        flex-direction: column;
      }

      #main-area {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      #viewport {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #viewport canvas {
        display: block;
      }

      #side-panel {
        width: 240px;
        background: #16213e;
        border-left: 1px solid #0f3460;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow-y: auto;
      }

      #side-panel h2 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #a0a0c0;
        border-bottom: 1px solid #0f3460;
        padding-bottom: 8px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control-group label {
        font-size: 12px;
        color: #8080a0;
      }

      .control-group input[type="range"] {
        width: 100%;
        accent-color: #00ccff;
      }

      .slider-value {
        font-size: 11px;
        color: #606080;
        text-align: right;
      }

      .bird-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .bird-controls button {
        flex: 1;
        padding: 6px 0;
        background: #0f3460;
        border: 1px solid #1a4080;
        color: #e0e0e0;
        font-size: 16px;
        cursor: pointer;
        border-radius: 4px;
      }

      .bird-controls button:hover:not(:disabled) {
        background: #1a4080;
      }

      .bird-controls button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #viewport-hint {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #8090b0;
        font-size: 16px;
        pointer-events: none;
        letter-spacing: 0.5px;
      }

      #status-bar {
        height: 28px;
        background: #0f3460;
        border-top: 1px solid #1a4080;
        display: flex;
        align-items: center;
        padding: 0 12px;
        font-size: 12px;
        color: #8090b0;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="main-area">
        <div id="viewport">
          <div id="viewport-hint">Click to add birds</div>
        </div>
        <div id="side-panel">
          <h2>Controls</h2>
          <div class="control-group">
            <label>Birds</label>
            <div class="bird-controls">
              <button id="add-bird-btn" type="button">[+]</button>
              <button id="remove-bird-btn" type="button">[-]</button>
            </div>
          </div>
          <div class="control-group">
            <label>Obstacles</label>
            <button id="clear-obstacles-btn" type="button" style="padding: 6px 0; background: #0f3460; border: 1px solid #1a4080; color: #e0e0e0; font-size: 12px; cursor: pointer; border-radius: 4px;">Clear obstacles</button>
          </div>
          <div class="control-group">
            <label for="separation-slider">Separation</label>
            <input
              type="range"
              id="separation-slider"
              min="0"
              max="2"
              step="0.05"
              value="0.5"
            />
            <span class="slider-value" id="separation-value">0.50</span>
          </div>
          <div class="control-group">
            <label for="alignment-slider">Alignment</label>
            <input
              type="range"
              id="alignment-slider"
              min="0"
              max="1"
              step="0.05"
              value="0.7"
            />
            <span class="slider-value" id="alignment-value">0.70</span>
          </div>
          <div class="control-group">
            <label for="cohesion-slider">Cohesion</label>
            <input
              type="range"
              id="cohesion-slider"
              min="0"
              max="1"
              step="0.05"
              value="0.6"
            />
            <span class="slider-value" id="cohesion-value">0.60</span>
          </div>
        </div>
      </div>
      <div id="status-bar">Loading...</div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
